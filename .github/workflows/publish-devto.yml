name: Publish to dev.to

on:
  workflow_dispatch:
    inputs:
      files:
        description: "Newline-separated post paths to publish"
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - "docs/posts/**/*.md"

concurrency:
  group: publish-devto-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Collect changed post files
        id: changed-posts
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          zero_sha="0000000000000000000000000000000000000000"

          if [ "$BEFORE_SHA" = "$zero_sha" ]; then
            echo "Falling back to tracked post files because BEFORE_SHA represents a first-push/new-branch event: $BEFORE_SHA"
            mapfile -t files < <(git ls-files 'docs/posts/**/*.md')
          elif ! git rev-parse --verify "$BEFORE_SHA^{commit}" >/dev/null 2>&1; then
            echo "Falling back to tracked post files because BEFORE_SHA is unreachable: $BEFORE_SHA"
            mapfile -t files < <(git ls-files 'docs/posts/**/*.md')
          else
            # Use Git pathspec magic so ** matches nested markdown files under docs/posts.
            mapfile -t files < <(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- ':(glob)docs/posts/**/*.md')
          fi

          if [ "${#files[@]}" -eq 0 ]; then
            {
              echo "count=0"
              echo "files="
            } >> "$GITHUB_OUTPUT"
            echo "No changed posts to publish in this push range"
            exit 0
          fi

          {
            echo "count=${#files[@]}"
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          printf 'Changed posts:\n'
          printf '%s\n' "${files[@]}"

      - name: Publish articles to dev.to
        if: steps.changed-posts.outputs.count != '0'
        env:
          DEVTO_TOKEN: ${{ secrets.DEVTO_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.files }}" ]; then
            mapfile -t files <<EOF
          ${{ github.event.inputs.files }}
          EOF
          else
            mapfile -t files <<EOF
          ${{ steps.changed-posts.outputs.files }}
          EOF
          fi

          npm run publish:devto -- "${files[@]}"

      - name: Commit synced article metadata
        if: steps.changed-posts.outputs.count != '0'
        run: |
          if git diff --quiet -- docs/posts; then
            echo "No synced post metadata changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/posts
          git commit -m "docs: reconcile dev.to article metadata"
          git push
