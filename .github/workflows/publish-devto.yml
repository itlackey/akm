name: Publish to dev.to

on:
  push:
    branches: [main]
    paths:
      - "docs/posts/**/*.md"

concurrency:
  group: publish-devto-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Collect changed post files
        id: changed-posts
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            mapfile -t files < <(git ls-files 'docs/posts/**/*.md')
          else
            mapfile -t files < <(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- ':(glob)docs/posts/**/*.md')
          fi

          if [ "${#files[@]}" -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "No changed posts to publish"
            exit 0
          fi

          {
            echo "count=${#files[@]}"
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          printf 'Changed posts:\n'
          printf '%s\n' "${files[@]}"

      - name: Publish articles to dev.to
        if: steps.changed-posts.outputs.count != '0'
        env:
          DEVTO_TOKEN: ${{ secrets.DEVTO_TOKEN }}
        run: |
          mapfile -t files <<EOF
          ${{ steps.changed-posts.outputs.files }}
          EOF

          npx -y @sinedied/devto-cli push "${files[@]}" \
            --token "$DEVTO_TOKEN" \
            --repo "${GITHUB_REPOSITORY}" \
            --branch "${GITHUB_REF_NAME}" \
            --reconcile

      - name: Commit synced article metadata
        if: steps.changed-posts.outputs.count != '0'
        run: |
          if git diff --quiet -- docs/posts; then
            echo "No synced post metadata changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/posts
          git commit -m "docs: reconcile dev.to article metadata"
          git push
