name: Publish to dev.to

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/posts/**/*.md"

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Publish articles to dev.to
        env:
          DEVTO_TOKEN: ${{ secrets.DEVTO_TOKEN }}
        run: npm run publish:devto
