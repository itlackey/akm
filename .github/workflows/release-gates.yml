name: Release Gates

# Heavy validation that is too slow for every commit. This is a RELEASE gate,
# NOT a commit gate — it runs ONLY on manual `workflow_dispatch`, invoked once
# before cutting a release (and on demand). It deliberately does NOT trigger on
# push or pull_request, so day-to-day commits (even on an open release PR) get
# only the fast `ci.yml` (lint + types + unit). `release.yml`'s pre-publish
# `bun run check` (incl. integration) remains the hard gate on the actual
# release dispatch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  # NOTE: `bun test --parallel=N` at ANY N (including 1) is unsafe on this Bun
  # version — it adds a redundant worker-IPC layer on top of `--isolate` for
  # zero parallelism benefit at N=1, and the isolate/worker path it engages has
  # an intermittent epoll_ctl EEXIST race / busy-spin hang (reproduced at
  # parallel=12, parallel=4, AND parallel=1 under CPU contention). Test runs
  # here pass `--isolate` alone (still required for correctness — see
  # test-unit.sh) but never `--parallel`; the integration suite is sharded
  # across separate runner jobs for speed. See release.yml for the full
  # rationale.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Integration suite (shard ${{ matrix.shard }}/4, sequential)
        env:
          SHARD: ${{ matrix.shard }}/4
        run: bash scripts/run-test-shard.sh integration

  # Order-dependence / flake detector: run the FULL unit suite twice in fresh
  # processes to surface leaked env / singletons / stateful DB rows. `bun run
  # test:unit` (scripts/test-unit.sh) still shards across separate OS
  # processes for speed and passes `--isolate` (required for correctness) but
  # never `--parallel` — see ci.yml/release.yml for why that flag is unsafe at
  # any N. Informational (continue-on-error) — a consistently-red run signals
  # new order-dependence.
  flake-detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Unit suite — run 1
        run: bun run test:unit
      - name: Unit suite — run 2 (fresh process, catches order-dependence)
        run: bun run test:unit

  # Node runtime matrix (#465 / #560). The runtime boundary
  # (src/runtime.ts + src/storage/database.ts) makes akm Node-capable, but the
  # `bun test` suite only runs under Bun — so the Node code paths are otherwise
  # never exercised. Build dist/ with Bun, compile the better-sqlite3 native
  # driver for each Node ABI, then run `test:node-smoke` UNDER NODE end-to-end.
  node-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install
      # Bun installs better-sqlite3 into its store but does NOT compile the native
      # binding for Node's ABI; npm runs the node-gyp lifecycle. `--no-save` keeps
      # the bun-managed manifest/lockfile untouched.
      - name: Install + compile better-sqlite3 for Node ${{ matrix.node-version }}
        run: npm install --no-save better-sqlite3@^11.8.0
      - name: Verify better-sqlite3 native binding loads under Node
        run: node -e "const D=require('better-sqlite3');const db=new D(':memory:');db.exec('CREATE TABLE t(x)');db.prepare('INSERT INTO t VALUES (?)').run(1);if(db.prepare('SELECT x FROM t').get().x!==1)process.exit(1);console.log('better-sqlite3 OK on Node '+process.versions.node)"
      - name: Build dist (Bun)
        run: bun run build
      - name: Node smoke test (runs the built CLI under node)
        run: bun run test:node-smoke
      - name: Node compat parity tests (Bun vs Node feature parity)
        run: bun run test:node-compat
        env:
          AKM_SMOKE_NODE: node

  semantic-search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v1
      - name: Run semantic search e2e tests
        run: AKM_SEMANTIC_TESTS=1 bun test tests/semantic-search-e2e.test.ts
        env:
          HF_HOME: ~/.cache/huggingface

  docker-install:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Run Docker install tests
        run: AKM_DOCKER_TESTS=1 bun test tests/integration/docker-install.test.ts
        env:
          HF_HOME: ~/.cache/huggingface
          DOCKER_BUILDKIT: "1"
