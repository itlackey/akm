name: Release Gates

# Heavy validation that is too slow for every commit. These run as RELEASE
# gates, not commit gates:
#   - on PRs INTO `main` (i.e. a release/* -> main release PR), so the full
#     battery validates the release content before it merges; and
#   - on manual `workflow_dispatch` (e.g. before dispatching the Release
#     workflow from a release/* branch).
# Per-commit fast feedback (lint + types + unit) lives in ci.yml.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TEST_PARALLEL: "4"
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Integration suite
        run: bun run test:integration

  # Order-dependence / flake detector: run the unit suite twice in fresh
  # processes to surface leaked env / singletons / stateful DB rows. Informational
  # (continue-on-error) — a consistently-red run signals new order-dependence.
  flake-detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    env:
      TEST_PARALLEL: "4"
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Unit suite — run 1
        run: bun run test:unit
      - name: Unit suite — run 2 (fresh process, catches order-dependence)
        run: bun run test:unit

  # Node runtime matrix (#465 / #560). The runtime boundary
  # (src/runtime.ts + src/storage/database.ts) makes akm Node-capable, but the
  # `bun test` suite only runs under Bun — so the Node code paths are otherwise
  # never exercised. Build dist/ with Bun, compile the better-sqlite3 native
  # driver for each Node ABI, then run `test:node-smoke` UNDER NODE end-to-end.
  node-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install
      # Bun installs better-sqlite3 into its store but does NOT compile the native
      # binding for Node's ABI; npm runs the node-gyp lifecycle. `--no-save` keeps
      # the bun-managed manifest/lockfile untouched.
      - name: Install + compile better-sqlite3 for Node ${{ matrix.node-version }}
        run: npm install --no-save better-sqlite3@^11.8.0
      - name: Verify better-sqlite3 native binding loads under Node
        run: node -e "const D=require('better-sqlite3');const db=new D(':memory:');db.exec('CREATE TABLE t(x)');db.prepare('INSERT INTO t VALUES (?)').run(1);if(db.prepare('SELECT x FROM t').get().x!==1)process.exit(1);console.log('better-sqlite3 OK on Node '+process.versions.node)"
      - name: Build dist (Bun)
        run: bun run build
      - name: Node smoke test (runs the built CLI under node)
        run: bun run test:node-smoke

  semantic-search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v1
      - name: Run semantic search e2e tests
        run: AKM_SEMANTIC_TESTS=1 bun test tests/semantic-search-e2e.test.ts
        env:
          HF_HOME: ~/.cache/huggingface

  docker-install:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - name: Run Docker install tests
        run: AKM_DOCKER_TESTS=1 bun test tests/integration/docker-install.test.ts
        env:
          HF_HOME: ~/.cache/huggingface
          DOCKER_BUILDKIT: "1"
