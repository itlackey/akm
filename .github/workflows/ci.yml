name: CI

# Fast per-commit CI: lint + types + unit tests only. The heavy validation
# (integration, Node runtime matrix, semantic-search e2e, docker-install,
# order-dependence flake-detect) runs in `release-gates.yml` on release PRs
# (into `main`) and on manual dispatch — those are RELEASE gates, not commit
# gates, so day-to-day commits get fast feedback.
#
# `release/*` is intentionally listed only under `pull_request`. Every change to
# a release branch goes through a PR, and the pull_request run validates the
# merged state (against `refs/pull/N/merge`). Adding `release/*` to `push` would
# duplicate every merge with a redundant run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, "fix/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"
  pull_request:
    branches: [main, "release/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"

jobs:
  # Speed strategy: Bun's in-process test parallelism (`bun test --parallel=N`,
  # N>1) has an intermittent epoll_ctl EEXIST race on the new 1.3.x --isolate
  # workers — an fd is registered with epoll while a freed fd number is recycled,
  # so a worker hits `EEXIST: epoll_ctl` and the run fails or busy-spins to a
  # hang (reproduced in ~2/3 parallel=12 runs; also hung at parallel=4). So we
  # never use in-process parallelism; instead we SHARD across separate runner
  # jobs (separate process => separate fd table => no cross-shard collisions)
  # and run `--parallel=1` within each shard. See release.yml for the full
  # rationale and the release gate (which also shards the integration suite).
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Lint + types
        run: |
          bun run lint
          bunx tsc --noEmit

  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # 8-way (not 4): fewer tests per shard process = less fd churn = lower
        # Bun --isolate epoll busy-spin probability. See release.yml.
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Unit tests (shard ${{ matrix.shard }}/8, sequential)
        env:
          SHARD: ${{ matrix.shard }}/8
        run: bash scripts/run-test-shard.sh unit

  # Node and Bun are co-equal supported runtimes, so the Node path is gated on
  # every commit (not just at release time). The `bun test` suite runs only under
  # Bun, so this job exercises the Node code paths: it compiles the better-sqlite3
  # native driver for each supported Node ABI, verifies it loads, builds dist/
  # with Bun, then runs the smoke + parity suites UNDER NODE. (release-gates.yml
  # keeps its own copy for the manual release gate.)
  node-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install
      # Bun installs better-sqlite3 into its store but does NOT compile the native
      # binding for Node's ABI; npm runs the node-gyp lifecycle. `--no-save` keeps
      # the bun-managed manifest/lockfile untouched.
      - name: Install + compile better-sqlite3 for Node ${{ matrix.node-version }}
        run: npm install --no-save better-sqlite3@^11.8.0
      - name: Verify better-sqlite3 native binding loads under Node
        run: node -e "const D=require('better-sqlite3');const db=new D(':memory:');db.exec('CREATE TABLE t(x)');db.prepare('INSERT INTO t VALUES (?)').run(1);if(db.prepare('SELECT x FROM t').get().x!==1)process.exit(1);console.log('better-sqlite3 OK on Node '+process.versions.node)"
      - name: Build dist (Bun)
        run: bun run build
      - name: Node smoke test (runs the built CLI under node)
        run: bun run test:node-smoke
      - name: Node compat parity tests (Bun vs Node feature parity)
        run: bun run test:node-compat
        env:
          AKM_SMOKE_NODE: node
