name: CI

# `release/*` is intentionally listed only under `pull_request`. Every change
# to a release branch goes through a PR, and the pre-merge pull_request run
# already validates the merged state (pull_request CI runs against the
# `refs/pull/N/merge` ref, which is the PR head merged into its base). Adding
# `release/*` to `push` duplicated every merge with a second redundant run.
# Direct pushes to `release/*` are not an expected flow; if one is ever needed,
# re-add the pattern and trust the human operator to read the resulting run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, "fix/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"
  pull_request:
    branches: [main, "release/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # GitHub runners have ~4 cores; the test scripts default to --parallel=12
    # (dev machines). Over-subscribing the runner caused an intermittent
    # Bun-runtime `epoll_ctl EEXIST` race under load, so cap workers to the
    # runner's core count on CI.
    env:
      TEST_PARALLEL: "4"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Full project check
        run: bun run check

  # Order-dependence / flake detector. `bun test` shares ONE process across the
  # whole unit suite, so a test that leaks process.env, a singleton, fake timers,
  # or stateful DB rows can pass on one scheduling and fail on another. Running
  # the unit suite a SECOND time in a fresh, independent process surfaces those
  # nondeterministic flakes that a single run hides. Informational only
  # (continue-on-error) so a pre-existing intermittent flake never blocks a merge
  # — but a consistently-red run here is a strong signal of new order-dependence.
  flake-detect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Unit suite — run 1
        run: bun run test:unit

      - name: Unit suite — run 2 (fresh process, catches order-dependence)
        run: bun run test:unit

  semantic-search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v1

      - name: Run semantic search e2e tests
        run: AKM_SEMANTIC_TESTS=1 bun test tests/semantic-search-e2e.test.ts
        env:
          HF_HOME: ~/.cache/huggingface

  docker-install:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Run Docker install tests
        run: AKM_DOCKER_TESTS=1 bun test tests/integration/docker-install.test.ts
        env:
          HF_HOME: ~/.cache/huggingface
          DOCKER_BUILDKIT: "1"
