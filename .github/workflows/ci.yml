name: CI

on:
  push:
    branches: [main, "fix/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"
  pull_request:
    branches: [main, "release/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build

  node-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Verify the Node fallback
        run: |
          npm install --no-save better-sqlite3@^11.8.0
          bun run test:node-smoke
          bun run test:node-compat
        env:
          AKM_SMOKE_NODE: node
