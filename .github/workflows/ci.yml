name: CI

# Fast per-commit CI: lint + types + unit tests only. The heavy validation
# (integration, Node runtime matrix, semantic-search e2e, docker-install,
# order-dependence flake-detect) runs in `release-gates.yml` on release PRs
# (into `main`) and on manual dispatch — those are RELEASE gates, not commit
# gates, so day-to-day commits get fast feedback.
#
# `release/*` is intentionally listed only under `pull_request`. Every change to
# a release branch goes through a PR, and the pull_request run validates the
# merged state (against `refs/pull/N/merge`). Adding `release/*` to `push` would
# duplicate every merge with a redundant run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, "fix/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"
  pull_request:
    branches: [main, "release/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Run test files sequentially to avoid a Bun v1.x epoll_ctl EEXIST race:
    # force-stopping mock HTTP servers (stop(true)) recycles fd numbers fast,
    # and concurrent workers can hit a stale epoll entry for the reused fd.
    # Sequential execution eliminates concurrent fd pressure entirely.
    env:
      TEST_PARALLEL: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Lint + types + unit tests
        run: bun run check:fast
