name: CI

# Fast per-commit CI: lint + types + unit tests only. The heavy validation
# (integration, Node runtime matrix, semantic-search e2e, docker-install,
# order-dependence flake-detect) runs in `release-gates.yml` on release PRs
# (into `main`) and on manual dispatch — those are RELEASE gates, not commit
# gates, so day-to-day commits get fast feedback.
#
# `release/*` is intentionally listed only under `pull_request`. Every change to
# a release branch goes through a PR, and the pull_request run validates the
# merged state (against `refs/pull/N/merge`). Adding `release/*` to `push` would
# duplicate every merge with a redundant run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, "fix/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"
  pull_request:
    branches: [main, "release/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "**/CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"

jobs:
  # Speed strategy: Bun's in-process test parallelism (`bun test --parallel=N`,
  # any N including 1) implies `--isolate` and spawns worker PROCESSES over
  # IPC. On Bun 1.3.x that isolate/worker-IPC path has an intermittent
  # epoll_ctl EEXIST race — an fd is registered with epoll while a freed fd
  # number is recycled, so a worker hits `EEXIST: epoll_ctl` and the run fails
  # or busy-spins to a hang (reproduced at parallel=12, parallel=4, AND
  # parallel=1 under CPU contention). We never use `--parallel`; instead we
  # SHARD across separate runner jobs (separate process => separate fd table
  # => no cross-shard collisions).
  #
  # CORRECTED (2026-07-01): `--parallel=1` was previously ALSO passed within
  # each shard on the theory that N=1 meant "no parallelism, so no race." It
  # doesn't — `--parallel` adds a redundant worker-IPC layer on top of
  # `--isolate` for zero benefit at N=1. `--isolate` itself is still passed
  # (dropping it entirely reintroduces real cross-file test-pollution
  # failures — see test-unit.sh) but WITHOUT the `--parallel` wrapper. That
  # cut the hang rate under simulated contention (8 shards pinned to 2 cores)
  # from 4/8 (with `--parallel=1`) to 1/8 (with `--isolate` alone) in
  # back-to-back runs — a large reduction, not a full elimination; the
  # remaining risk is `--isolate` itself under heavy contention, which looks
  # like a genuine Bun 1.3.x runtime issue below the application.
  # `run-test-shard.sh`'s single retry-on-timeout is the backstop for that
  # residual risk. See release.yml for the full rationale and the release
  # gate (which also shards the integration suite).
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Lint + types
        run: |
          bun run lint
          bunx tsc --noEmit

  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # 8-way (not 4): fewer tests per shard process = less fd churn = lower
        # Bun --isolate epoll busy-spin probability. See release.yml.
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Unit tests (shard ${{ matrix.shard }}/8, sequential)
        env:
          SHARD: ${{ matrix.shard }}/8
        run: bash scripts/run-test-shard.sh unit

  # Node and Bun are co-equal supported runtimes, so the Node path is gated on
  # every commit (not just at release time). The `bun test` suite runs only under
  # Bun, so this job exercises the Node code paths: it compiles the better-sqlite3
  # native driver for each supported Node ABI, verifies it loads, builds dist/
  # with Bun, then runs the smoke + parity suites UNDER NODE. (release-gates.yml
  # keeps its own copy for the manual release gate.)
  node-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - run: bun install
      # Bun installs better-sqlite3 into its store but does NOT compile the native
      # binding for Node's ABI; npm runs the node-gyp lifecycle. `--no-save` keeps
      # the bun-managed manifest/lockfile untouched.
      - name: Install + compile better-sqlite3 for Node ${{ matrix.node-version }}
        run: npm install --no-save better-sqlite3@^11.8.0
      - name: Verify better-sqlite3 native binding loads under Node
        run: node -e "const D=require('better-sqlite3');const db=new D(':memory:');db.exec('CREATE TABLE t(x)');db.prepare('INSERT INTO t VALUES (?)').run(1);if(db.prepare('SELECT x FROM t').get().x!==1)process.exit(1);console.log('better-sqlite3 OK on Node '+process.versions.node)"
      - name: Build dist (Bun)
        run: bun run build
      - name: Node smoke test (runs the built CLI under node)
        run: bun run test:node-smoke
      - name: Node compat parity tests (Bun vs Node feature parity)
        run: bun run test:node-compat
        env:
          AKM_SMOKE_NODE: node
