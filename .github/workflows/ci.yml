name: CI

# `release/*` is intentionally listed only under `pull_request`. Every change
# to a release branch goes through a PR, and the pre-merge pull_request run
# already validates the merged state (pull_request CI runs against the
# `refs/pull/N/merge` ref, which is the PR head merged into its base). Adding
# `release/*` to `push` duplicated every merge with a second redundant run.
# Direct pushes to `release/*` are not an expected flow; if one is ever needed,
# re-add the pattern and trust the human operator to read the resulting run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, "fix/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"
  pull_request:
    branches: [main, "release/*"]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "CHANGELOG.md"
      - "schemas/**"
      - "CLAUDE.md"
      - "LICENSE"
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Full project check
        run: bun run check

  semantic-search:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Cache HuggingFace models
        uses: actions/cache@v5
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ runner.os }}-v1

      - name: Run semantic search e2e tests
        run: AKM_SEMANTIC_TESTS=1 bun test tests/semantic-search-e2e.test.ts
        env:
          HF_HOME: ~/.cache/huggingface

  docker-install:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Run Docker install tests
        run: AKM_DOCKER_TESTS=1 bun test tests/docker-install.test.ts
        env:
          HF_HOME: ~/.cache/huggingface
          DOCKER_BUILDKIT: "1"
