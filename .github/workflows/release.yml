name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3). Bumps package.json, publishes to npm, builds binaries, and creates a GitHub release."
        required: true
        type: string

jobs:
  # Speed strategy (see also ci.yml): shard across SEPARATE runner jobs; each
  # shard runs a plain `bun test` (no `--isolate`, no `--parallel`).
  # `--parallel` at ANY N (including 1) implies `--isolate` and spawns worker
  # processes over IPC — the Bun 1.3.x path with the intermittent
  # `EEXIST epoll_ctl` race / busy-spin hang; never re-add it. `--isolate` was
  # removed 2026-07-02 after the DI-seams refactor eliminated cross-file
  # `mock.module()` pollution (the three remaining @clack/prompts mock.module
  # suites restore the real module in their own `afterAll`); verified by a
  # two-file leak probe + repeated green full-suite runs without --isolate.
  # The matrix runs shards concurrently, so wall-clock is ~total/N.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - name: Lint + types
        run: |
          bun run lint
          bunx tsc --noEmit

  test-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # 8-way keeps per-shard wall time low; also historical: fewer tests
        # per process meant less fd churn back when --isolate was in play.
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - name: Unit tests (shard ${{ matrix.shard }}/8, sequential)
        env:
          SHARD: ${{ matrix.shard }}/8
        run: bash scripts/run-test-shard.sh unit

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - name: Integration tests (shard ${{ matrix.shard }}/4, sequential)
        env:
          SHARD: ${{ matrix.shard }}/4
        run: bash scripts/run-test-shard.sh integration

  version:
    needs: [lint, test-unit, test-integration]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      prerelease: ${{ steps.tag.outputs.prerelease }}
    steps:
      - name: Validate dispatch branch and version
        run: |
          BRANCH="${{ github.ref_name }}"
          DEFAULT="${{ github.event.repository.default_branch }}"
          VERSION="${{ inputs.version }}"
          if [ "$BRANCH" = "$DEFAULT" ]; then
            echo "Dispatched from default branch ($BRANCH)."
          elif [[ "$BRANCH" == release/* ]] && echo "$VERSION" | grep -qE '-'; then
            echo "Dispatched from release branch ($BRANCH) with prerelease version ($VERSION)."
          elif [[ "$BRANCH" == hotfix/* ]] && ! echo "$VERSION" | grep -qE '-'; then
            echo "Dispatched from hotfix branch ($BRANCH) with stable version ($VERSION)."
          else
            echo "Releases must be dispatched from $DEFAULT, from a release/* branch with a prerelease version, or from a hotfix/* branch with a stable version."
            echo "Got branch=$BRANCH version=$VERSION"
            exit 1
          fi
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: Bump version
        run: npm version "${{ inputs.version }}" --no-git-tag-version --allow-same-version

      - name: Commit and tag
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: bump version to ${{ inputs.version }}"
            git push
          fi
          if git rev-parse -q --verify "refs/tags/v${{ inputs.version }}" >/dev/null; then
            echo "Tag v${{ inputs.version }} already exists locally."
          else
            git tag "v${{ inputs.version }}"
          fi
          if git ls-remote --tags origin | grep -q "refs/tags/v${{ inputs.version }}$"; then
            echo "Tag v${{ inputs.version }} already exists on origin."
          else
            git push origin "v${{ inputs.version }}"
          fi
          echo "tag=v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          if echo "${{ inputs.version }}" | grep -qE '[-]'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: bun install
      - run: npm install -g npm@latest
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "akm-cli@$VERSION" version >/dev/null 2>&1; then
            echo "akm-cli@$VERSION is already published; skipping npm publish."
            exit 0
          fi
          if echo "$VERSION" | grep -qE '[-]'; then
            echo "Prerelease detected ($VERSION) — publishing with --tag next"
            npm publish --provenance --access public --tag next
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: akm-linux-x64
          - target: bun-linux-arm64
            artifact: akm-linux-arm64
          - target: bun-darwin-x64
            artifact: akm-darwin-x64
          - target: bun-darwin-arm64
            artifact: akm-darwin-arm64
          - target: bun-windows-x64
            artifact: akm-windows-x64.exe
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - run: bun install --omit optional

      - name: Compile binary
        run: bun build ./src/cli.ts --compile --target=${{ matrix.target }} --outfile ${{ matrix.artifact }} --define "AKM_VERSION='${{ inputs.version }}'"

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  github-release:
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.version.outputs.tag }}
          path: source

      - uses: actions/download-artifact@v6
        with:
          path: artifacts

      - name: Stage install scripts as release assets
        run: |
          # install.sh / install.ps1 ship as release assets so users can pin to a
          # specific release version (the README points at releases/latest/download/
          # rather than raw.githubusercontent.com/.../main/, which made any bad
          # commit on main instantly break every new install worldwide).
          cp source/install.sh artifacts/install.sh
          cp source/install.ps1 artifacts/install.ps1

      - name: Generate checksums
        run: |
          : > artifacts/checksums.txt
          for file in \
            artifacts/akm-linux-x64/akm-linux-x64 \
            artifacts/akm-linux-arm64/akm-linux-arm64 \
            artifacts/akm-darwin-x64/akm-darwin-x64 \
            artifacts/akm-darwin-arm64/akm-darwin-arm64 \
            artifacts/akm-windows-x64.exe/akm-windows-x64.exe \
            artifacts/install.sh \
            artifacts/install.ps1
          do
            printf '%s  %s\n' "$(sha256sum "$file" | awk '{ print $1 }')" "$(basename "$file")" >> artifacts/checksums.txt
          done

      - name: Create GitHub release
        run: |
          TAG="${{ needs.version.outputs.tag }}"
          REPO="${{ github.repository }}"
          PRERELEASE_FLAG=""
          if [ "${{ needs.version.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          upload_assets() {
            gh release upload "$TAG" \
              --repo "$REPO" \
              --clobber \
              artifacts/checksums.txt \
              artifacts/akm-linux-x64/akm-linux-x64 \
              artifacts/akm-linux-arm64/akm-linux-arm64 \
              artifacts/akm-darwin-x64/akm-darwin-x64 \
              artifacts/akm-darwin-arm64/akm-darwin-arm64 \
              artifacts/akm-windows-x64.exe/akm-windows-x64.exe \
              artifacts/install.sh \
              artifacts/install.ps1
          }

          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            upload_assets
            exit 0
          fi

          for attempt in 1 2 3 4 5; do
            if gh release create "$TAG" \
              --repo "$REPO" \
              --title "$TAG" \
              --generate-notes \
              $PRERELEASE_FLAG \
              artifacts/checksums.txt \
              artifacts/akm-linux-x64/akm-linux-x64 \
              artifacts/akm-linux-arm64/akm-linux-arm64 \
              artifacts/akm-darwin-x64/akm-darwin-x64 \
              artifacts/akm-darwin-arm64/akm-darwin-arm64 \
              artifacts/akm-windows-x64.exe/akm-windows-x64.exe \
              artifacts/install.sh \
              artifacts/install.ps1; then
              exit 0
            fi

            if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
              upload_assets
              exit 0
            fi

            sleep $((attempt * 10))
          done

          exit 1
        env:
          GH_TOKEN: ${{ github.token }}
