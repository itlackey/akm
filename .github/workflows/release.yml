name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version already committed in package.json (for example, 1.2.3)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: release
    env:
      CANDIDATE_VERSION: ${{ inputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Verify version
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if [ "$PACKAGE_VERSION" != "$CANDIDATE_VERSION" ]; then
            echo "package.json is $PACKAGE_VERSION, not $CANDIDATE_VERSION"
            exit 1
          fi

      - name: Build package and binaries
        run: |
          cp .github/README.npm.md README.md
          bun run build
          mkdir artifacts
          while read -r target output; do
            bun build ./src/cli.ts \
              --compile \
              --target="$target" \
              --external @huggingface/transformers \
              --outfile "artifacts/$output" \
              --define "AKM_VERSION='$CANDIDATE_VERSION'"
          done <<'EOF'
          bun-linux-x64 akm-linux-x64
          bun-linux-arm64 akm-linux-arm64
          bun-darwin-x64 akm-darwin-x64
          bun-darwin-arm64 akm-darwin-arm64
          bun-windows-x64 akm-windows-x64.exe
          EOF
          cp install.sh install.ps1 artifacts/
          (cd artifacts && sha256sum akm-* install.sh install.ps1 > checksums.txt)
          npm pack --ignore-scripts --pack-destination artifacts

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if npm view "akm-cli@$CANDIDATE_VERSION" version >/dev/null 2>&1; then
            echo "akm-cli@$CANDIDATE_VERSION is already published"
            exit 0
          fi
          if [[ "$CANDIDATE_VERSION" == *-* ]]; then
            DIST_TAG=next
          else
            DIST_TAG=latest
          fi
          npm publish "artifacts/akm-cli-$CANDIDATE_VERSION.tgz" \
            --ignore-scripts \
            --provenance \
            --access public \
            --tag "$DIST_TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$CANDIDATE_VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" artifacts/akm-* artifacts/install.sh artifacts/install.ps1 artifacts/checksums.txt --clobber
            exit 0
          fi
          PRERELEASE=()
          if [[ "$CANDIDATE_VERSION" == *-* ]]; then
            PRERELEASE=(--prerelease)
          fi
          gh release create "$TAG" \
            --target "$GITHUB_SHA" \
            --title "$TAG" \
            --generate-notes \
            "${PRERELEASE[@]}" \
            artifacts/akm-* \
            artifacts/install.sh \
            artifacts/install.ps1 \
            artifacts/checksums.txt
