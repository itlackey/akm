##
# OpenViking test server for manual testing of the `openviking` provider
# and `akm show viking://…` remote show support.
#
# Usage:
#   cd tests/fixtures/openviking
#   docker compose up -d
#
# Then configure akm:
#   akm registry add http://localhost:1933 --name openviking --provider openviking
#   akm search "project context" --source registry
#   akm show viking://memories/project-context
#
# Tear down:
#   docker compose down
##

services:
  openviking:
    image: ghcr.io/volcengine/openviking:latest
    container_name: akm-openviking-test
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "1933:1933"
    environment:
      OPENVIKING_CONFIG_FILE: /config/ov.conf
      HOME: /tmp
    volumes:
      - ../../../.dev/workspace:/workspace
      - ./ov.conf:/config/ov.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
