<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>akm %%COMMAND%%</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1117;
      --surface: #161b22;
      --border:  #30363d;
      --text:    #e6edf3;
      --muted:   #8b949e;
      --accent:  #58a6ff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.6;
      padding: 24px;
    }

    header {
      max-width: 980px;
      margin: 0 auto 16px;
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }
    header .logo { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    header .command { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; color: var(--muted); }

    main { max-width: 980px; margin: 0 auto; }

    pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    footer {
      max-width: 980px;
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
<header>
  <span class="logo">akm</span>
  <span class="command">%%COMMAND%%</span>
</header>
<main>
  <pre>%%CONTENT_JSON%%</pre>
</main>
<footer>
  <span>akm — Agent Knowledge Management</span>
  <span>Generated %%GENERATED_AT%%</span>
</footer>
</body>
</html>
