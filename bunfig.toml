[test]
# Global test harness: sandboxes env (HOME, all XDG_*, AKM_*), cwd, and
# globalThis.fetch around every test, resets known module-level singletons,
# and (Phase 2) trips on any leak of those state surfaces.
#
# See tests/_preload.ts and the test-harness-redesign design doc
# (knowledge:projects/akm/test-harness-redesign) for the contract.
preload = ["./tests/_preload.ts"]
# Raise the per-test timeout from the 5 s default. Several tests make
# localhost HTTP connections that take 2–4 s to fail gracefully, and
# under parallel load that can exceed 5 s and produce spurious failures.
timeout = 15000
